<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Page</title>
    <link rel="stylesheet" href="styles.css">
    <script src="payment-modal.js" defer></script>
</head>
<body>
    <header>
        <h1>Welcome to Our Store</h1>
    </header>
    <main>
        <div class="product-box">
            <img src="image1.jpg" alt="Product 1">
            <h2>Product 1</h2>
            <p>Price: $10.00</p>
            <button class="buy-button" data-modal="modal1">Buy Now</button>
        </div>
        <div class="product-box">
            <img src="image2.jpg" alt="Product 2">
            <h2>Product 2</h2>
            <p>Price: $20.00</p>
            <button class="buy-button" data-modal="modal2">Buy Now</button>
        </div>
        <!-- Add more products as needed -->
    </main>

    <div id="modal1" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Payment Options for Product 1</h2>
            <form>
                <label for="payment-method">Choose a payment method:</label>
                <select name="payment-method" id="payment-method">
                    <option value="credit-card">Credit Card</option>
                    <option value="pix">PIX</option>
                </select>
                <button type="submit">Proceed to Payment</button>
            </form>
        </div>
    </div>

    <div id="modal2" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Payment Options for Product 2</h2>
            <form>
                <label for="payment-method">Choose a payment method:</label>
                <select name="payment-method" id="payment-method">
                    <option value="credit-card">Credit Card</option>
                    <option value="pix">PIX</option>
                </select>
                <button type="submit">Proceed to Payment</button>
            </form>
        </div>
    </div>

    <script>
        document.querySelectorAll('.buy-button').forEach(button => {
            button.addEventListener('click', function() {
                const modalId = this.getAttribute('data-modal');
                document.getElementById(modalId).style.display = 'block';
            });
        });
        document.querySelectorAll('.close').forEach(span => {
            span.onclick = function() {
                this.parentElement.parentElement.style.display = 'none';
            };
        });
    </script>
</body>
</html>
